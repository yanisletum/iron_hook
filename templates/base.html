{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IRON HOOK{% endblock %}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="{% url 'core:index' %}" class="brand-logo">IRON HOOK</a>
            </div>
                
            <div class="menu">
                <a href="{% url 'blog:post_list' %}">Блог</a>
                <a href="{% url 'shop:product_list' %}">Магазин</a>
                <a href="{% url 'core:about' %}">О нас</a>
                <a href="{% url 'core:contact' %}">Контакты</a>

                {% if user.is_authenticated %}
                    <a href="{% url 'users:profile' %}">Профиль ({{ user.username }})</a>
                {% else %}
                    <a href="{% url 'users:login' %}">Вход</a>
                    <a href="{% url 'users:register' %}">Регистрация</a>
                {% endif %}

                <a href="{% url 'cart:cart_detail' %}" class="cart-link">
                    Корзина (<span id="cart-counter">{{ cart_total_items|default:"0" }}</span>)
                </a>
            </div>
                
            <form action="{% url 'shop:product_list' %}" method="get" style="display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-left: auto; max-width: 350px;">
                <input type="text" name="q" placeholder="Поиск снастей..." style="flex: 1; min-width: 180px; padding: 8px 15px; border-radius: 20px; border: 1px solid #ccc; font-size: 1rem; margin: 0;">
                <button type="submit" class="btn" style="padding: 8px 20px; border-radius: 20px; width: auto; margin: 0; white-space: nowrap;">Найти</button>
            </form>
                
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <div style="display: none;">
        {% csrf_token %}
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            // 1. ЛОГИКА ДОБАВЛЕНИЯ В КОРЗИНУ (Твой старый рабочий код)
            document.querySelectorAll('.add-to-cart-btn').forEach(button => {
                button.addEventListener('click', function(e) {
                    e.preventDefault(); 
                    
                    const productId = this.dataset.id; 
                    let variation = '';
                    const selectElement = document.getElementById(`var-${productId}`);
                    
                    if (selectElement) {
                        variation = encodeURIComponent(selectElement.value); 
                    }
                    
                    const url = `/cart/add/${productId}/?variation=${variation}`;

                    fetch(url)
                        .then(response => response.json())
                        .then(data => {
                            if(data.success) {
                                document.getElementById('cart-counter').innerText = data.total_items;
                                
                                const originalText = this.innerText;
                                this.innerText = "Добавлено!";
                                this.style.backgroundColor = "#27ae60"; 
                                this.style.color = "white";
                                
                                setTimeout(() => {
                                    this.innerText = originalText;
                                    this.style.backgroundColor = "var(--accent-color)";
                                    this.style.color = "#1a252f";
                                }, 2000);
                            }
                        })
                        .catch(error => console.error('Ошибка добавления в корзину:', error));
                });
            });

            // 2. ЛОГИКА УДАЛЕНИЯ ИЗ КОРЗИНЫ (Новый код для крестиков)
            const removeButtons = document.querySelectorAll('.remove-from-cart-btn');
            console.log("ЖУЧОК 1: Найдено крестиков на странице -", removeButtons.length);

            removeButtons.forEach(button => {
                button.addEventListener('click', function(e) {
                    e.preventDefault();
                    console.log("ЖУЧОК 2: Клик по крестику зафиксирован!");

                    const productId = this.getAttribute('data-product-id');
                    const variation = this.getAttribute('data-variation');
                    const row = this.closest('tr');
                    
                    // Берем токен безопасности прямо из скрытого поля на странице!
                    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

                    fetch('/cart/remove-ajax/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': csrfToken
                        },
                        body: JSON.stringify({
                            'product_id': productId,
                            'variation': variation
                        })
                    })
                    .then(response => {
                        console.log("ЖУЧОК 3: Ответ от сервера пришел!", response.status);
                        return response.json();
                    })
                    .then(data => {
                        if (data.success) {
                            // Плавное удаление строки
                            row.style.transition = "opacity 0.3s";
                            row.style.opacity = "0";
                            setTimeout(() => { row.remove(); }, 300);
                            
                            // Обновление общей суммы
                            const totalPriceElement = document.getElementById('cart-total-price');
                            if (totalPriceElement) totalPriceElement.textContent = data.cart_total_price;
                            
                            // Обновление счетчика в шапке
                            const cartCounterElement = document.getElementById('cart-counter');
                            if (cartCounterElement) cartCounterElement.textContent = data.cart_len;

                            // Перезагрузка если корзина опустела
                            if (data.cart_len === 0) {
                                setTimeout(() => { window.location.reload(); }, 300);
                            }
                        }
                    })
                    .catch(error => console.error('ЖУЧОК 4 (ОШИБКА):', error));
                });
            });

        });
    </script>
</body>
</html>
