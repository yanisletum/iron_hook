{% extends 'base.html' %}

{% block title %}Вход - IRON HOOK{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 40px auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee;">
    <h1 style="color: var(--primary-color); margin-top: 0; margin-bottom: 30px; text-align: center;">Вход в аккаунт</h1>
    
    <style>
        .auth-form p { margin-bottom: 20px; }
        .auth-form label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; }
        .auth-form input { width: 100%; padding: 12px 15px; border: 1px solid #dcdde1; border-radius: 4px; font-size: 1rem; box-sizing: border-box; transition: border-color 0.2s; }
        .auth-form input:focus { border-color: var(--accent-color); outline: none; box-shadow: 0 0 0 2px rgba(230, 126, 34, 0.2); }
    </style>

    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        
        <button type="submit" style="width: 100%; padding: 15px; font-size: 1.1rem; background-color: var(--primary-color); color: white; border: none; border-radius: 4px; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: background 0.2s; margin-top: 10px;" onmouseover="this.style.backgroundColor='var(--accent-color)'; this.style.color='#1a252f';" onmouseout="this.style.backgroundColor='var(--primary-color)'; this.style.color='white';">
            Войти
        </button>
    </form>
    
    <div style="text-align: center; margin-top: 25px; font-size: 0.95rem; color: #555;">
        Нет аккаунта? <a href="{% url 'users:register' %}" style="color: var(--primary-color); text-decoration: none; font-weight: bold;">Зарегистрироваться</a>
    </div>
</div>
{% endblock %}
