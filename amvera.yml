meta:
  environment: python
  toolchain:
    name: pip
    version: 3.11
build:
  requirementsPath: requirements.txt
run:
  persistenceMount: /data/media
  containerPort: 80
  # Добавляем скрипт подготовки перед запуском основного процесса
  command: python manage.py migrate && python manage.py loaddata datadump.json && gunicorn config.wsgi:application --bind 0.0.0.0:80